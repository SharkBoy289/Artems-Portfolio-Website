<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Agricola Online">
  <rect width="800" height="450" fill="#171a21"/>
  <!-- flat node graph: load balancer + game-server pods, monochrome with accent nodes -->
  <g stroke="#2a2f3a" stroke-width="2">
    <line x1="400" y1="250" x2="240" y2="180"/>
    <line x1="400" y1="250" x2="560" y2="180"/>
    <line x1="400" y1="250" x2="280" y2="330"/>
    <line x1="400" y1="250" x2="520" y2="330"/>
  </g>
  <g fill="#171a21" stroke="#c8825a" stroke-width="2.5">
    <circle cx="400" cy="250" r="30"/>
    <circle cx="240" cy="180" r="20"/>
    <circle cx="560" cy="180" r="20"/>
    <circle cx="280" cy="330" r="20"/>
    <circle cx="520" cy="330" r="20"/>
  </g>
  <text x="400" y="256" fill="#c8825a" font-family="Inter, sans-serif" font-size="15" font-weight="700" text-anchor="middle">LB</text>
  <text x="120" y="110" fill="#f5f5f4" font-family="Inter, sans-serif" font-size="30" font-weight="700">Agricola Online</text>
</svg>
