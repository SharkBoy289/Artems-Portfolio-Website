<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Agricola Online">
  <defs>
    <linearGradient id="ag" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#065f46"/>
      <stop offset="1" stop-color="#0a0a0f"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#ag)"/>
  <!-- node graph evoking K8s pods / game rooms -->
  <g stroke="#10b981" stroke-width="2" opacity="0.45">
    <line x1="400" y1="240" x2="220" y2="160"/>
    <line x1="400" y1="240" x2="580" y2="160"/>
    <line x1="400" y1="240" x2="260" y2="340"/>
    <line x1="400" y1="240" x2="540" y2="340"/>
  </g>
  <g fill="#0a0a0f" stroke="#34d399" stroke-width="3">
    <circle cx="400" cy="240" r="34"/>
    <circle cx="220" cy="160" r="22"/>
    <circle cx="580" cy="160" r="22"/>
    <circle cx="260" cy="340" r="22"/>
    <circle cx="540" cy="340" r="22"/>
  </g>
  <text x="400" y="247" fill="#34d399" font-family="Inter, sans-serif" font-size="16" font-weight="700" text-anchor="middle">LB</text>
  <text x="80" y="80" fill="#fafafa" font-family="Inter, sans-serif" font-size="34" font-weight="700">Agricola Online</text>
  <text x="80" y="408" fill="#a1a1aa" font-family="Inter, sans-serif" font-size="18">Go · WebSockets · Redis · Kubernetes</text>
</svg>
