<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Job Dashboard">
  <rect width="800" height="450" fill="#171a21"/>
  <!-- flat pipeline columns, monochrome -->
  <g fill="none" stroke="#2a2f3a" stroke-width="2">
    <rect x="120" y="150" width="160" height="180" rx="10"/>
    <rect x="320" y="150" width="160" height="180" rx="10"/>
    <rect x="520" y="150" width="160" height="180" rx="10"/>
  </g>
  <g fill="#c8825a">
    <circle cx="200" cy="185" r="5"/><circle cx="400" cy="185" r="5"/><circle cx="600" cy="185" r="5"/>
  </g>
  <g fill="#2a2f3a">
    <rect x="145" y="215" width="110" height="9" rx="4"/>
    <rect x="145" y="238" width="80" height="9" rx="4"/>
    <rect x="345" y="215" width="110" height="9" rx="4"/>
    <rect x="345" y="238" width="95" height="9" rx="4"/>
    <rect x="545" y="215" width="110" height="9" rx="4"/>
    <rect x="545" y="238" width="70" height="9" rx="4"/>
  </g>
  <text x="120" y="110" fill="#f5f5f4" font-family="Inter, sans-serif" font-size="30" font-weight="700">Job Dashboard</text>
</svg>
