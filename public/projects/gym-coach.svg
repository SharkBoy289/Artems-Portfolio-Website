<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" width="800" height="450" role="img" aria-label="Gym Coach App">
  <rect width="800" height="450" fill="#171a21"/>
  <!-- flat dumbbell, monochrome with accent bar -->
  <g fill="#2a2f3a">
    <rect x="250" y="200" width="24" height="80" rx="8"/>
    <rect x="286" y="180" width="20" height="120" rx="8"/>
    <rect x="494" y="180" width="20" height="120" rx="8"/>
    <rect x="526" y="200" width="24" height="80" rx="8"/>
  </g>
  <rect x="306" y="232" width="188" height="16" rx="8" fill="#c8825a"/>
  <!-- flat progress line -->
  <polyline points="150,360 250,335 350,340 450,305 550,295 650,255" fill="none" stroke="#2a2f3a" stroke-width="3"/>
  <text x="120" y="110" fill="#f5f5f4" font-family="Inter, sans-serif" font-size="30" font-weight="700">Gym Coach App</text>
</svg>
